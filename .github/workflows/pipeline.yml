# .github/workflows/pipeline.yml
#
# Pipeline CI/CD — roda em todo push e pull request
# Stages: lint → test → build-image → push-ecr → deploy-fargate

name: CI/CD Pipeline

on:
  push:
    branches: ["**"]        # qualquer branch dispara lint + test
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: diagnostico-medico-api
  ECS_CLUSTER: diagnostico-medico-api-cluster
  ECS_SERVICE: diagnostico-medico-api-service
  ECS_TASK_DEFINITION: diagnostico-medico-api

jobs:

  # ─────────────────────────────────────────────
  # 1. LINT — verifica estilo e erros de código
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências de dev
        run: pip install -e ".[dev]"

      - name: Rodar Ruff (linter)
        run: ruff check .

      - name: Rodar Ruff (formatter)
        run: ruff format --check .


  # ─────────────────────────────────────────────
  # 2. TEST — roda os testes com cobertura
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint                # só roda se lint passou

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências de dev
        run: pip install -e ".[dev]"

      - name: Rodar testes com cobertura
        run: pytest --cov=app --cov-report=term-missing

      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage


  # ─────────────────────────────────────────────
  # 3. BUILD IMAGE — constrói imagem Docker
  # ─────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test                # só roda se testes passaram

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag e push da imagem para Amazon ECR
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          # Build image
          docker build -t $REGISTRY/$REPOSITORY:latest .
          docker build -t $REGISTRY/$REPOSITORY:${{ github.sha }} .

          # Push both tags to ECR
          docker push $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:${{ github.sha }}

          # Output image with latest tag (for reference)
          echo "image=$REGISTRY/$REPOSITORY:latest" >> $GITHUB_OUTPUT

      - name: Output da imagem
        run: echo "Built image - ${{ steps.image.outputs.image }}"

      - name: Deploy to ECS (only on main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws ecs update-service \
            --cluster ${{ env.ECS_CLUSTER }} \
            --service ${{ env.ECS_SERVICE }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

          echo "✓ ECS deployment triggered"

      - name: Wait for service stability
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

          echo "✓ Service is stable and running latest image"
