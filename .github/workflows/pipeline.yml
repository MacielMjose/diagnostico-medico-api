# .github/workflows/pipeline.yml
#
# Pipeline CI/CD — roda em todo push e pull request
# Stages: lint → test → build → publish (só na main)

name: CI/CD Pipeline

on:
  push:
    branches: ["**"]        # qualquer branch dispara lint + test
  pull_request:
    branches: [main]

jobs:

  # ─────────────────────────────────────────────
  # 1. LINT — verifica estilo e erros de código
  # ─────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências de dev
        run: pip install -e ".[dev]"

      - name: Rodar Ruff (linter)
        run: ruff check .

      - name: Rodar Ruff (formatter)
        run: ruff format --check .


  # ─────────────────────────────────────────────
  # 2. TEST — roda os testes com cobertura
  # ─────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint                # só roda se lint passou

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências de dev
        run: pip install -e ".[dev]"

      - name: Rodar testes com cobertura
        run: pytest --cov=minha_api --cov-report=term-missing

      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage


  # ─────────────────────────────────────────────
  # 3. BUILD — empacota o projeto
  # ─────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test                # só roda se testes passaram

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar build
        run: pip install build

      - name: Gerar pacote (.whl e .tar.gz)
        run: python -m build

      - name: Guardar artefatos do build
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/


  # ─────────────────────────────────────────────
  # 4. PUBLISH — publica no PyPI (só na main)
  # ─────────────────────────────────────────────
  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    # Só executa quando há push direto na branch main
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Permissão necessária para autenticação OIDC com o PyPI
    permissions:
      id-token: write

    steps:
      - name: Baixar artefatos do build
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publicar no PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Usa Trusted Publisher (sem PYPI_TOKEN, mais seguro)
        # Configure em: https://pypi.org/manage/account/publishing/
