# .github/workflows/pipeline.yml
#
# CI/CD Pipeline - automated stages for lint, test, build, push, deploy
# AUTOMATIC: lint -> test -> build-image (on every push)
# MANUAL: push-to-ecr (workflow_dispatch)
# MANUAL: deploy-to-ecs (workflow_dispatch)

name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'push'
        type: choice
        options:
          - push
          - deploy
          - full

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: diagnostico-medico-api
  ECS_CLUSTER: diagnostico-medico-api-cluster
  ECS_SERVICE: diagnostico-medico-api-service
  ECS_TASK_DEFINITION: diagnostico-medico-api
  POSTHOG_ENABLED: "true"

jobs:

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run Ruff (linter)
        run: ruff check .

      - name: Run Ruff (formatter)
        run: ruff format --check .


  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage


  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t diagnostico-medico-api:${{ github.sha }} .
          docker build -t diagnostico-medico-api:latest .
      - name: Build completed successfully
        run: echo "Image built: diagnostico-medico-api:${{ github.sha }}"


  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.action, 'push') || contains(github.event.inputs.action, 'full'))

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image to Amazon ECR
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          docker build -t $REGISTRY/$REPOSITORY:latest .
          docker build -t $REGISTRY/$REPOSITORY:${{ github.sha }} .

          docker push $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:${{ github.sha }}

          echo "image=$REGISTRY/$REPOSITORY:latest" >> $GITHUB_OUTPUT
          echo "Image pushed to ECR"
      - name: Output image
        run: echo "Built and pushed - ${{ steps.image.outputs.image }}"


  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: [build-image, push-to-ecr]
    if: always() && needs.build-image.result == 'success' && (needs.push-to-ecr.result == 'success' || needs.push-to-ecr.result == 'skipped') && github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.action, 'deploy') || contains(github.event.inputs.action, 'full'))

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init
      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -out=tfplan
      - name: Terraform Apply (Deploy)
        run: |
          cd terraform
          terraform apply \
            -auto-approve \
            tfplan

          echo "Terraform apply completed"
          echo ""
          echo "Secrets created in AWS Secrets Manager:"
          terraform output -json secrets_arns 2>/dev/null | jq '.' || echo "No secrets output available"
      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

          echo "Service is stable and running latest image"
