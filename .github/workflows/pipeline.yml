# .github/workflows/pipeline.yml
#
# Pipeline CI/CD — separado em 3 stages independentes:
# AUTOMÁTICO: lint → test → build-image (local, sem push)
# MANUAL: push-to-ecr (workflow_dispatch)
# MANUAL: deploy-to-ecs (workflow_dispatch)

name: CI/CD Pipeline

on:
  push:
    branches: ["**"]        # qualquer branch dispara automático
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        default: 'push'
        type: choice
        options:
          - push      # Build + Tag + Push to ECR
          - deploy    # Deploy to ECS (requires latest in ECR)
          - full      # Push + Deploy (full release)

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: diagnostico-medico-api
  ECS_CLUSTER: diagnostico-medico-api-cluster
  ECS_SERVICE: diagnostico-medico-api-service
  ECS_TASK_DEFINITION: diagnostico-medico-api
  POSTHOG_ENABLED: "true"

jobs:

  # ─────────────────────────────────────────────────────────
  # 1. LINT — verifica estilo e erros de código (AUTOMÁTICO)
  # ─────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências de dev
        run: pip install -e ".[dev]"

      - name: Rodar Ruff (linter)
        run: ruff check .

      - name: Rodar Ruff (formatter)
        run: ruff format --check .


  # ─────────────────────────────────────────────────────────
  # 2. TEST — roda os testes com cobertura (AUTOMÁTICO)
  # ─────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Instalar dependências de dev
        run: pip install -e ".[dev]"

      - name: Rodar testes com cobertura
        run: pytest --cov=app --cov-report=term-missing

      - name: Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: .coverage


  # ─────────────────────────────────────────────────────────
  # 3. BUILD — constrói imagem Docker localmente (AUTOMÁTICO)
  # ─────────────────────────────────────────────────────────
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da imagem Docker
        run: |
          docker build -t diagnostico-medico-api:${{ github.sha }} .
          docker build -t diagnostico-medico-api:latest .

      - name: Build concluído com sucesso
        run: echo "Image built: diagnostico-medico-api:${{ github.sha }}"


  # ─────────────────────────────────────────────────────────
  # 4. PUSH — faz push para ECR (MANUAL via workflow_dispatch)
  # ─────────────────────────────────────────────────────────
  push-to-ecr:
    name: Push to ECR
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.action, 'push') || contains(github.event.inputs.action, 'full'))

    permissions:
      id-token: write
      contents: read

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build e push da imagem para Amazon ECR
        id: image
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ env.ECR_REPOSITORY }}
        run: |
          # Build image com tags
          docker build -t $REGISTRY/$REPOSITORY:latest .
          docker build -t $REGISTRY/$REPOSITORY:${{ github.sha }} .

          # Push ambas tags para ECR
          docker push $REGISTRY/$REPOSITORY:latest
          docker push $REGISTRY/$REPOSITORY:${{ github.sha }}

          # Output da imagem
          echo "image=$REGISTRY/$REPOSITORY:latest" >> $GITHUB_OUTPUT
          echo "Imagem enviada para ECR"

      - name: Output da imagem
        run: echo "Built and pushed - ${{ steps.image.outputs.image }}"


  # ─────────────────────────────────────────────────────────
  # 5. DEPLOY — faz deploy para ECS com Terraform (MANUAL)
  # ─────────────────────────────────────────────────────────
  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && (contains(github.event.inputs.action, 'deploy') || contains(github.event.inputs.action, 'full'))
    needs: [build-image, push-to-ecr]

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest

      - name: Configurar AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      - name: Terraform Plan
        run: |
          cd terraform
          terraform plan -out=tfplan

      - name: Terraform Apply (Deploy)
        run: |
          cd terraform
          terraform apply \
            -auto-approve \
            tfplan

          echo "Terraform apply concluído"
          echo ""
          echo "Secrets created in AWS Secrets Manager:"
          terraform output -json secrets_arns 2>/dev/null | jq '.' || echo "No secrets output available"

      - name: Wait for ECS service stability
        run: |
          aws ecs wait services-stable \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --region ${{ env.AWS_REGION }}

          echo "Service is stable and running latest image"
