[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "diagnostico-medico-api"
version = "1.0.0"
description = "PCOS Diagnosis API - Medical diagnostic system with ML models and LLM integration"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "starlette>=0.40",
    "scikit-learn>=1.3",
    "xgboost>=2.0",
    "pandas>=2.0",
    "numpy>=1.24",
    "joblib>=1.3",
    "httpx>=0.27",
    "python-multipart>=0.0.9",
    "structlog>=24.0",
    "prometheus-fastapi-instrumentator>=7.0",
    "Pillow>=10.0",
    "anyio>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-cov>=5.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
    "ruff>=0.4",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
asyncio_mode = "auto"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 88

[tool.ruff.lint]
select = ["E", "F", "I"]  # erros, flake8, isort